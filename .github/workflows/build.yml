name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go tests
        run: CGO_ENABLED=0 go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: devbox:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name devbox-test -p 8080:8080 -v devbox-test-data:/data devbox:test

      - name: Wait for startup
        run: sleep 5

      - name: Test status endpoint
        run: |
          STATUS=$(curl -sf http://localhost:8080/api/status)
          echo "Status response: $STATUS"
          if [ -z "$STATUS" ]; then echo "FAIL: empty status response" && exit 1; fi

      - name: Test dashboard frontend
        run: |
          HTML=$(curl -sf http://localhost:8080/)
          echo "Frontend response length: ${#HTML}"
          if [ -z "$HTML" ]; then echo "FAIL: empty frontend response" && exit 1; fi

      - name: Cleanup
        if: always()
        run: docker rm -f devbox-test