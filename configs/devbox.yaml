server:
  port: 8080
  auth_token: ""
  public_url: ""                # 公网访问地址，如 https://dev.example.com

mirrors:
  npm:
    enabled: true
    upstream: "https://registry.npmjs.org"
    cache_ttl: "7d"
  pypi:
    enabled: true
    upstream: "https://pypi.org/simple"
    cache_ttl: "30d"
  docker:
    enabled: true
    upstream: "https://registry-1.docker.io"
    cache_ttl: "0"
  golang:
    enabled: true
    upstream: "https://proxy.golang.org"
    cache_ttl: "0"
  cran:
    enabled: true
    upstream: "https://cran.r-project.org"
    cache_ttl: "30d"
  ghcr:
    enabled: true
    upstream: "https://ghcr.io"
    cache_ttl: "0"
  quay:
    enabled: true
    upstream: "https://quay.io"
    cache_ttl: "0"
  mcr:
    enabled: true
    upstream: "https://mcr.microsoft.com"
    cache_ttl: "0"
  ghapi:
    enabled: true
    upstream: "https://api.github.com"
    cache_ttl: "0"
  hf:
    enabled: true
    upstream: "https://huggingface.co"
    cache_ttl: "7d"

gitproxy:
  enabled: true
  github_upstream: "https://github.com"
  gitlab_upstream: "https://gitlab.com"
  cache_ttl: "7d"

cache:
  dir: "/data/cache"
  max_size: "5GB"

logging:
  level: "info"
  access_log: true
  retention_days: 30              # 流量日志保留天数，过期自动清除

rate_limit:
  enabled: false                  # 启用 IP 限流
  rate: 500                       # 每个 IP 每时段最大请求数
  interval: "3h"                  # 时段长度
  whitelist: []                   # 白名单 IP/CIDR（免限速）
  blacklist: []                   # 黑名单 IP/CIDR（永远禁止）